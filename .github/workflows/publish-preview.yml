#
# Publish on MyGet when merged in main
#

name: publish-preview

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - .github/workflows/**
      - src/**
      - tests/**

permissions:
  contents: read

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # IMPORTANT: fetch-depth 0 downloads the entire history and tags.
          # The default (1) does not download tags, causing the next step to fail.
          fetch-depth: 0

      - name: Show git information
        run: |
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Commit hash: $(git rev-parse HEAD)"
          echo "Last tag: $(git describe --tags --abbrev=0 --match 'v*')"
      
      - name: "Determine version: preview"
        id: version
        run: |
          # Gets the latest tag pointing to the current or previous commit, matching only tags starting with 'v'
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)
          
          # Verifica se a variável LAST_TAG está vazia ou nula
          if [ -z "$LAST_TAG" ]; then
            echo "::error::❌ No matching tags starting with 'v' were found in the repository. Aborting process."
            exit 1
          fi
          
          # Removes the leading 'v' from the tag (e.g., v1.2.0 becomes 1.2.0)
          CLEAN_TAG=${LAST_TAG#v}
          
          # Splits the clean tag into Major, Minor, and Patch arrays using '.' as the separator
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN_TAG"
          
          # Increments the Patch version by 1
          NEXT_PATCH=$((PATCH + 1))
          
          # Rebuilds the base version (e.g., from 1.2.0 it becomes 1.2.1)
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          
          # Gets the PR number from the native GitHub Actions context
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # Assembles the final preview version (e.g., 1.2.0-preview.pr-42)
          PREVIEW_VERSION="${NEXT_VERSION}-preview.pr-${PR_NUMBER}"
          
          echo "Previous stable version: $CLEAN_TAG"
          echo "::notice::Version: $PREVIEW_VERSION"
          
          # Saves the version to the environment file for subsequent steps to use
          echo "PACKAGE_VERSION=$PREVIEW_VERSION" >> $GITHUB_ENV
          echo "package_version=$PREVIEW_VERSION" >> $GITHUB_OUTPUT

      - name: Abort if version indeterminate
        if: steps.version.outputs.package_version == ''
        uses: actions/github-script@v9
        with:
          script: core.setFailed("Version could not be determined to workflow.");

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Display .NET Version
        run: dotnet --version

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/Extensions.Reflection.csproj --configuration Release --no-build -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload nupkg artifact to github
        uses: actions/upload-artifact@v7
        with:
          name: Maestria.Extensions.Reflection.${{ env.PACKAGE_VERSION }}
          path: src/bin/Release/*.nupkg

      - name: Publish preview version to MyGet
        run: dotnet nuget push src/bin/Release/*.nupkg --source https://www.myget.org/F/maestrianet/api/v3/index.json --api-key "${{ secrets.MYGET_API_KEY }}"
