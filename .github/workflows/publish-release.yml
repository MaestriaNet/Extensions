#
# Publish on NuGet when tag generated.
#

name: publish-release

on:
  push:
    tags:
      - 'v*.*.*' # Triggers only when a tag matching the pattern (e.g., v1.0.0) is pushed

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # IMPORTANT: fetch-depth 0 downloads the entire history and tags.
          # The default (1) does not download tags, causing the next step to fail.
          fetch-depth: 0

      - name: Show git information
        run: |
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Commit hash: $(git rev-parse HEAD)"
          echo "Current tag: $GITHUB_REF_NAME"

      - name: Check if tag is on the latest main commit or a hotfix branch
        # Informational step to validate if the tag points to the absolute HEAD of the main branch
        run: |
          # Gets the commit SHA that triggered this tag creation
          TAG_COMMIT=${GITHUB_SHA}
          
          # Gets the latest commit SHA from the local origin/main reference
          MAIN_COMMIT=$(git rev-parse origin/main)
          
          echo "Commit triggered by tag: $TAG_COMMIT"
          echo "Latest commit on main:   $MAIN_COMMIT"
          
          # 1. Check if the tag is on the HEAD of the main branch
          if [ "$TAG_COMMIT" = "$MAIN_COMMIT" ]; then
            echo "✅ Validation passed: Tag is on the latest commit of the main branch."
            exit 0
          fi
          
          # 2. If not on main, check if the commit belongs to a hotfix branch
          # The command lists the remote branches that contain the tag's commit
          BRANCHES=$(git branch -r --contains $TAG_COMMIT)
          
          if echo "$BRANCHES" | grep -q "origin/hotfix/"; then
            echo "✅ Validation passed: Tag is on a hotfix branch."
            echo "Branches found: $BRANCHES"
            exit 0
          else
            echo "::error::❌ The tag was NOT created on the latest main commit, nor on a hotfix branch."
            echo "::error::Aborting the process to prevent publishing from an unauthorized state."
            exit 1
          fi

      - name: "Determine version: stable"
        id: version
        run: |
          # GITHUB_REF_NAME contains the tag name (e.g., v1.2.0)
          # We remove the leading 'v' to get the clean semantic version (1.2.0)
          CLEAN_TAG=${GITHUB_REF_NAME#v}
          
          echo "Extracted version: $CLEAN_TAG"
          echo "PACKAGE_VERSION=$CLEAN_TAG" >> $GITHUB_ENV
          echo "package_version=$CLEAN_TAG" >> $GITHUB_OUTPUT
          
          echo "::notice::Version: $CLEAN_TAG"

      - name: Abort if version indeterminate
        if: steps.version.outputs.package_version == ''
        uses: actions/github-script@v9
        with:
          script: core.setFailed("Version could not be determined to workflow.");

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Display .NET Version
        run: dotnet --version

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/Extensions.csproj --configuration Release --no-build -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload nupkg artifact to github
        uses: actions/upload-artifact@v7
        with:
          name: Maestria.Extensions.${{ env.PACKAGE_VERSION }}
          path: src/bin/Release/*.nupkg

      - name: Publish stable version to MyGet
        run: dotnet nuget push src/bin/Release/*.nupkg --source https://www.myget.org/F/maestrianet/api/v3/index.json --api-key "${{ secrets.MYGET_API_KEY }}"
        
      - name: Publish stable version to NuGet
        run: dotnet nuget push src/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: "v${{ steps.version.outputs.package_version }}"
          tag: "v${{ steps.version.outputs.package_version }}"
          artifacts: "src/bin/Release/*.nupkg"
          generateReleaseNotes: true
          
          # Allow create release from github interface.
          # Github interface create release and tag, that start this workflow and update artifacts of created releases.
          # When workflow starts from tag push, this execute all from here and create release linking a existing tag.
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitDraftDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
